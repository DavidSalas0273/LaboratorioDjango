<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Registrar Asistencia</title>
  </head>
  <body>
    <h1>Registrar Asistencia</h1>
    <form method="post">
      {% csrf_token %}
      <table>
        {{ form.as_table }}
      </table>
      <button type="submit">Guardar</button>
    </form>
    <p><a href="{% url 'asistencia:list' %}">Volver a la lista</a></p>
  </body>
</html>
